# Prepares a branch for a channel:
# * Checks out the channel branch
# * Downloads language binding artifacts
# * Pushes the channel branch changes to origin
#
# INPUTS
# * channel:  The release channel
name: Prepare Channel
on:
  workflow_call:
    inputs:
      channel:
        type: string
        required: true

jobs:
  credential-check:
    uses: ./.github/workflows/credential-check.yml
    with:
      assert_version: false

  update-bindings:
    needs: credential-check
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.channel }}

      - name: Configure git user
        run: |
          git config --global user.name "$GITHUB_ACTOR"
          git config --global user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - name: Download Python bindings
        uses: actions/download-artifact@v4
        with:
          name: python_bindings
          path: python/src/opendp/

      - name: Download R bindings
        uses: actions/download-artifact@v4
        with:
          name: r_bindings
          path: R/opendp/

      - name: Drop R release tarballs from tracked history
        run: rm -f R/opendp/src/vendor.tar.xz R/opendp/src/source.tar.xz R/opendp/src/binary.tar.xz
      
      - name: Push changes
        run: |
          # Generated files are git-ignored, so we need --force.
          git add --force python/src/opendp/ R/opendp/
          git commit -m "Update bindings"
          git push origin ${{ inputs.channel }}

name: lean-repro checks

# Parallel reproduction of the Lean verification results (branch eddie/lean-repro).
# It is NOT wired into the normal PR gate — it runs manually (workflow_dispatch) and
# on pushes to the repro branch, so we can exercise the checks while the branch lives
# on its own for a while. Everything it touches is confined to
# rust/opendp_verified/repro/ plus this workflow file.

on:
  workflow_dispatch: {}          # manual "Run workflow" button
  push:
    branches: [eddie/lean-repro]
    paths:
      - 'rust/opendp_verified/repro/**'
      - '.github/workflows/lean-repro.yml'

concurrency:
  group: lean-repro-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lean-and-blueprint:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      # Pins live in exactly one place (check_lean_pins.sh); read them here so the
      # clone commands can never drift from what the build verifies.
      - name: Read dependency pins
        run: |
          eval "$(grep -E '^(AENEAS_URL|AENEAS_TAG|CHARON_URL|CHARON_COMMIT|SAMPCERT_URL|SAMPCERT_COMMIT)=' \
                  rust/opendp_verified/repro/tools/check_lean_pins.sh)"
          {
            echo "AENEAS_URL=$AENEAS_URL"
            echo "AENEAS_TAG=$AENEAS_TAG"
            echo "CHARON_URL=$CHARON_URL"
            echo "CHARON_COMMIT=$CHARON_COMMIT"
            echo "SAMPCERT_URL=$SAMPCERT_URL"
            echo "SAMPCERT_COMMIT=$SAMPCERT_COMMIT"
          } >> "$GITHUB_ENV"

      - name: Install elan (Lean toolchain manager)
        run: |
          curl -sSfL https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh \
            | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      # The graphviz + TeXLive .debs are ~374 MB, and a throttled apt mirror once
      # turned that download into a 71-minute stall ("Fetched 374 MB in 1h 10min,
      # 87.9 kB/s"). Cache the downloaded .debs under a FIXED key so the mirror is
      # contacted at most once: on a cache hit every install runs from local .debs.
      # actions/cache entries are immutable per key, so this cache is written once
      # (~374 MB) and does NOT grow run-to-run — bump `-vN` by hand only when the
      # package list below changes.
      - name: Cache apt .debs (graphviz + system deps + TeXLive, ~374 MB, fixed)
        uses: actions/cache@v5
        with:
          path: ~/apt-archives
          key: apt-debs-${{ runner.os }}-v1

      - name: apt-get update
        run: |
          SECONDS=0
          sudo apt-get update
          echo "::notice title=apt-get update::${SECONDS}s"

      # graphviz + dev headers must precede `uv tool install` so pygraphviz builds.
      # libgmp-dev/pkg-config/m4 are the system deps for the OCaml build (zarith
      # links against gmp; opam needs m4). TeXLive is required by the blueprint step:
      # plasTeX shells out to `kpsewhich` to locate \usepackage .sty files (amsthm
      # etc.) and to resolve \input files; without it \newtheorem never registers the
      # theorem environments and plastexdepgraph crashes with
      # "TypeError: unhashable type: 'definition'".
      #
      # Both apt calls target our own archive dir (so actions/cache can own it without
      # root): `--download-only` fetches just the .debs not already cached (≈0s on a
      # warm cache; a one-package top-up if the base image bumped a version; the full
      # 374 MB only cold), then `--no-download` installs straight from those .debs
      # with no mirror contact. The two timings separate network from TeXLive's
      # single-threaded post-install triggers (fmtutil/mktexlsr).
      - name: Install graphviz + system deps + TeXLive (from .deb cache)
        run: |
          PKGS="graphviz libgraphviz-dev pkg-config libgmp-dev m4 perl
                texlive-latex-base texlive-latex-recommended texlive-latex-extra
                texlive-fonts-recommended texlive-science"
          arch="$HOME/apt-archives"
          mkdir -p "$arch/partial"
          opts="-o Dir::Cache::archives=$arch/ -o Dir::Cache::archives::partial=$arch/partial/"
          SECONDS=0
          sudo apt-get install -y --download-only $opts $PKGS
          echo "::notice title=apt download (cold≈374MB, warm≈0)::${SECONDS}s"
          SECONDS=0
          sudo apt-get install -y --no-download $opts $PKGS
          echo "::notice title=apt unpack+triggers::${SECONDS}s"
          # Persist only the .debs: drop apt's lock/partial cruft and hand the dir to
          # the runner user so the post-job cache save hits no permission errors.
          sudo rm -rf "$arch/partial" "$arch/lock"
          sudo chown -R "$(id -u):$(id -g)" "$arch"

      - name: Install uv
        run: |
          SECONDS=0
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          echo "::notice title=uv install::${SECONDS}s"

      # `uv tool install` compiles pygraphviz from source against libgraphviz-dev.
      - name: Install leanblueprint (uv tool)
        run: |
          SECONDS=0
          "$HOME/.local/bin/uv" tool install leanblueprint
          echo "::notice title=leanblueprint (uv tool) install::${SECONDS}s"

      # OCaml 5.2 via opam — the toolchain that build_aeneas_bin.sh builds
      # charon/aeneas with (opam is the single source of truth for the OCaml
      # deps; we do NOT use aeneas's nix flake). The action caches ~/.opam itself.
      # charon's Rust frontend uses the nightly pinned in its rust-toolchain file,
      # which the preinstalled rustup fetches on first build.
      - name: Set up OCaml 5.2 (opam) for the Aeneas build
        uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: "5.2.1"

      # Cache the heavy, pin-keyed artifacts: the two gitignored dep checkouts and the
      # sub-package .lake build. Key on the pins + the manifest so a bump invalidates it.
      - name: Cache Lean deps + build
        uses: actions/cache@v4
        with:
          path: |
            aeneas
            SampCert
            rust/opendp_verified/repro/.lake
            rust/opendp_verified/repro/target
          key: lean-repro-${{ runner.os }}-${{ env.AENEAS_TAG }}-${{ env.CHARON_COMMIT }}-${{ env.SAMPCERT_COMMIT }}-${{ hashFiles('rust/opendp_verified/repro/lake-manifest.json') }}

      - name: Clone pinned aeneas (build-tag) + charon, and SampCert (fork hash)
        run: |
          if [ ! -e aeneas/.git ]; then
            git clone "$AENEAS_URL" aeneas
            git -C aeneas checkout "$AENEAS_TAG"
          fi
          # charon is NOT an aeneas submodule — clone it separately at the pin so the
          # pin guard's `charon HEAD` check has a real checkout to inspect. Guard on the
          # resolved HEAD (not just `.git`'s presence): a stale cache can leave a broken
          # submodule stub at aeneas/charon whose `.git` exists but resolves to nothing.
          if [ "$(git -C aeneas/charon rev-parse HEAD 2>/dev/null)" != "$CHARON_COMMIT" ]; then
            rm -rf aeneas/charon
            git clone "$CHARON_URL" aeneas/charon
            git -C aeneas/charon checkout "$CHARON_COMMIT"
          fi
          if [ ! -e SampCert/.git ]; then
            git clone "$SAMPCERT_URL" SampCert
            git -C SampCert checkout "$SAMPCERT_COMMIT"
          fi
          # build_lean.sh applies the vendored SampCert 4.30 patch (git apply) itself.

      - name: Run lean-repro checks (pins + Lean build + blueprint)
        run: bash rust/opendp_verified/repro/tools/test_build.sh
